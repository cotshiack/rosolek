name: Home asset validation

on:
  pull_request:
  push:
    branches:
      - main-screen-update

jobs:
  validate-home-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Home assets
        run: python scripts/validate_home_assets.py
